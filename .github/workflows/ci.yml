name: SOC Platform CI

on:
  push:
    branches: [main, develop, "feature/*"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: 
          python-version: "${{ env.PYTHON_VERSION }}"
      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -r backend/requirements.txt
      - name: Run ruff linter
        run: ruff check backend/app/
      - name: Run mypy type checker
        run: mypy backend/app/ --ignore-missing-imports --no-strict-optional

  backend-tests:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
        env:
          discovery.type: single-node
          ELASTIC_PASSWORD: test_password
          xpack.security.enabled: "true"
          xpack.security.http.ssl.enabled: "false"
        ports: 
          - "9200:9200"
        options: >-
          --health-cmd "curl -u elastic:test_password -s http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      ES_HOST: localhost
      ES_PORT: 9200
      ES_USERNAME: elastic
      ES_PASSWORD: test_password
      ES_VERIFY_CERTS: "false"
      MODEL_DIR: /tmp/models
      CHROMA_PERSIST_DIR: /tmp/chroma
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: 
          python-version: "${{ env.PYTHON_VERSION }}"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest-cov pytest-asyncio httpx
      - name: Run unit tests
        run: |
          cd backend
          pytest tests/test_models/ tests/test_features/ -v --tb=short \
                 --cov=app --cov-report=xml -x
      - name: Run integration tests
        run: |
          cd backend
          pytest tests/test_api/ -v --tb=short
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with: 
          files: backend/coverage.xml

  frontend-tests:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: 
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      # Add tests here when configured
      # - run: npm run test -- --reporter=verbose
      #   working-directory: frontend

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: 
          python-version: "${{ env.PYTHON_VERSION }}"
      - name: Python dependency audit
        run: pip install pip-audit && pip-audit -r backend/requirements.txt || true
      - uses: actions/setup-node@v4
        with: 
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Node dependency audit
        run: npm audit --audit-level=high || true
        working-directory: frontend
      - name: Run bandit (Python security linter)
        run: pip install bandit && bandit -r backend/app/ -ll -x backend/app/slm/ || true

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t soc-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t soc-frontend:ci ./frontend
