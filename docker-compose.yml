version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: isro-soc-elasticsearch
    environment:
      - node.name=es01
      - cluster.name=isro-soc-cluster
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elasticpassword}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - soc-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: isro-soc-kibana
    environment:
      - SERVER_NAME=kibana
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-elasticpassword}
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - soc-network

volumes:
  es_data:
    driver: local

networks:
  soc-network:
    driver: bridge
