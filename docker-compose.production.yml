version: "3.9"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - ELASTIC_PASSWORD=${ES_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.keystore.path=certs/elastic-certificates.p12
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ./certs:/usr/share/elasticsearch/config/certs:ro
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: "2.0"
    healthcheck:
      test: curl -k -u elastic:${ES_PASSWORD} -s https://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - soc_internal

  backend:
    image: ${REGISTRY:-soc}/backend:${VERSION:-latest}
    restart: unless-stopped
    environment:
      - SOC_ENVIRONMENT=production
      - ES_HOST=elasticsearch
      - ES_PASSWORD=${ES_PASSWORD}
      - ES_VERIFY_CERTS=true
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SECRETS_ENCRYPTION_KEY=${SECRETS_ENCRYPTION_KEY}
      - KIBANA_URL=http://172.30.253.121:5601
    volumes:
      - models_data:/app/models/saved
      - app_data:/app/data
      - ./logs:/app/logs
    depends_on:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: "4.0"
      restart_policy:
        condition: on-failure
        max_attempts: 5
    healthcheck:
      test: curl -f http://localhost:8000/health/ready
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - soc_internal
      - soc_public

  frontend:
    image: ${REGISTRY:-soc}/frontend:${VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - soc_public

  nginx_proxy:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/server.crt:/etc/nginx/certs/server.crt:ro
      - ./certs/server.key:/etc/nginx/certs/server.key:ro
    depends_on:
      - frontend
      - backend
    networks:
      - soc_public

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - soc_internal

  grafana:
    image: grafana/grafana:10.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: https://soc.istrac.isro.gov.in/grafana
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - soc_internal
      - soc_public

networks:
  soc_internal:
    internal: true
  soc_public:

volumes:
  es_data:
  models_data:
  app_data:
  prometheus_data:
  grafana_data:
